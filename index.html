<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Feed</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #EFEFEF; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }

    /* ── Top Loader Bar ── */
    #top-loader {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      width: 0%;
      background: #2688eb;
      z-index: 9999;
      transition: width 0.4s ease, opacity 0.3s ease;
      opacity: 0;
    }
    #top-loader.loading {
      opacity: 1;
      width: 75%;
      transition: width 0.8s ease;
    }
    #top-loader.done {
      opacity: 1;
      width: 100%;
      transition: width 0.2s ease;
    }
    #top-loader.hide {
      opacity: 0;
      width: 100%;
      transition: opacity 0.4s ease 0.1s;
    }
  </style>
</head>
<body>
  <div id="top-loader"></div>
  <div id="root"></div>

  <script>
    // ── Top Loader controller ──
    const Loader = {
      el: document.getElementById('top-loader'),
      start() {
        this.el.className = '';
        void this.el.offsetWidth; // force reflow
        this.el.className = 'loading';
      },
      finish() {
        this.el.className = 'done';
        setTimeout(() => { this.el.className = 'hide'; }, 250);
        setTimeout(() => { this.el.className = ''; }, 700);
      }
    };
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const shimmer = `
      @keyframes shimmer {
        0% { background-position: -600px 0; }
        100% { background-position: 600px 0; }
      }
      @keyframes heartPop {
        0%   { transform: scale(1); }
        40%  { transform: scale(1.4); }
        70%  { transform: scale(0.88); }
        100% { transform: scale(1); }
      }
    `;

    // ── Skeleton ──
    const SkeletonBox = ({ width = "100%", height = 14, borderRadius = 6, style = {} }) => (
      <div style={{ width, height, borderRadius, background: "linear-gradient(90deg, #E8EAED 25%, #F4F5F7 50%, #E8EAED 75%)", backgroundSize: "600px 100%", animation: "shimmer 1.4s infinite linear", ...style }} />
    );

    const SkeletonCard = () => (
      <div style={{ width: "100%", background: "#fff", boxShadow: "0 1px 2px rgba(0,0,0,0.2)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 12px 0 12px" }}>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <SkeletonBox width={40} height={40} borderRadius={50} />
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              <SkeletonBox width={130} height={13} />
              <SkeletonBox width={80} height={11} />
            </div>
          </div>
          <div style={{ display: "flex", gap: 4 }}>
            <SkeletonBox width={28} height={28} borderRadius={50} />
            <SkeletonBox width={28} height={28} borderRadius={50} />
          </div>
        </div>
        <div style={{ padding: "12px 16px", display: "flex", flexDirection: "column", gap: 8 }}>
          <SkeletonBox width="90%" height={13} />
          <SkeletonBox width="60%" height={13} />
        </div>
        <SkeletonBox width="100%" height={0} borderRadius={0} style={{ aspectRatio: "1 / 1.15", height: "auto" }} />
        <div style={{ display: "flex", alignItems: "center", padding: "8px 16px 6px 16px", gap: 8 }}>
          <div style={{ display: "flex" }}>
            {[0,1,2].map(i => <SkeletonBox key={i} width={18} height={18} borderRadius={50} style={{ marginLeft: i === 0 ? 0 : -6, flexShrink: 0 }} />)}
          </div>
          <SkeletonBox width={160} height={13} />
        </div>
        <div style={{ display: "flex", padding: "4px 4px" }}>
          {[1,2,3].map(i => (
            <div key={i} style={{ flex: 1, display: "flex", justifyContent: "center", padding: "4px 2px" }}>
              <SkeletonBox width="80%" height={34} borderRadius={20} />
            </div>
          ))}
        </div>
        <div style={{ padding: "2px 16px 6px 16px" }}><SkeletonBox width={160} height={13} /></div>
        <div style={{ padding: "0 16px 14px 16px" }}><SkeletonBox width="50%" height={14} /></div>
      </div>
    );

    // ── Icons ──
    const HeartIcon = ({ filled, animating, size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={filled ? "#F33E58" : "none"} stroke={filled ? "#F33E58" : "currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ animation: animating ? "heartPop 0.35s ease" : "none", display: "block", flexShrink: 0 }}>
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    );
    const ShareIcon = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/>
      </svg>
    );
    const DotsIcon = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#65676B">
        <circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/>
      </svg>
    );
    const CloseIcon = () => (
      <svg width="20" height="20" viewBox="0 0 24 24">
        <line x1="18" y1="6" x2="6" y2="18" stroke="#65676B" strokeWidth="2" strokeLinecap="round"/>
        <line x1="6" y1="6" x2="18" y2="18" stroke="#65676B" strokeWidth="2" strokeLinecap="round"/>
      </svg>
    );
    const GlobeIcon = () => (
      <svg width="12" height="12" viewBox="0 0 24 24" fill="#65676B">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12" stroke="white" strokeWidth="2"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" fill="none" stroke="#65676B" strokeWidth="1.5"/>
      </svg>
    );
    const CheckBadge = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="#1877F2">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="9 12 11 14 15 10" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    );

    // ── Pill Button ──
    const PillButton = ({ renderIcon, label, active, activeColor = "#65676B", onClick }) => (
      <button onClick={onClick} style={{ flex: 1, background: "none", border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", padding: "4px 2px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "7px 14px", borderRadius: 20, color: active ? activeColor : "#65676B" }}>
          {renderIcon()}
          <span style={{ fontSize: 15, fontWeight: 600, color: active ? activeColor : "#65676B" }}>{label}</span>
        </div>
      </button>
    );

    // ── Image Carousel ──
    const ImageCarousel = () => {
      const images = ["https://picsum.photos/seed/socialpost/800/920","https://picsum.photos/seed/nature42/800/920"];
      const [slide, setSlide] = useState(0);
      const startX = useRef(null);
      const onTouchStart = (e) => { startX.current = e.touches[0].clientX; };
      const onTouchEnd = (e) => {
        if (startX.current === null) return;
        const diff = startX.current - e.changedTouches[0].clientX;
        if (diff > 40 && slide < images.length - 1) setSlide(s => s + 1);
        if (diff < -40 && slide > 0) setSlide(s => s - 1);
        startX.current = null;
      };
      const onMouseDown = (e) => { startX.current = e.clientX; };
      const onMouseUp = (e) => {
        if (startX.current === null) return;
        const diff = startX.current - e.clientX;
        if (diff > 40 && slide < images.length - 1) setSlide(s => s + 1);
        if (diff < -40 && slide > 0) setSlide(s => s - 1);
        startX.current = null;
      };
      return (
        <div style={{ width: "100%", aspectRatio: "1 / 1.15", position: "relative", overflow: "hidden", cursor: "grab", userSelect: "none" }}
          onTouchStart={onTouchStart} onTouchEnd={onTouchEnd} onMouseDown={onMouseDown} onMouseUp={onMouseUp}>
          <div style={{ display: "flex", width: `${images.length * 100}%`, height: "100%", transform: `translateX(-${slide * (100 / images.length)}%)`, transition: "transform 0.35s cubic-bezier(0.4,0,0.2,1)" }}>
            {images.map((src, i) => (
              <img key={i} src={src} alt={`Slide ${i + 1}`} draggable="false" style={{ width: `${100 / images.length}%`, height: "100%", objectFit: "cover", display: "block", flexShrink: 0 }} />
            ))}
          </div>
          <div style={{ position: "absolute", top: 10, right: 10, background: "rgba(0,0,0,0.45)", borderRadius: 20, padding: "4px 10px" }}>
            <span style={{ color: "#fff", fontSize: 13, fontWeight: 600 }}>{slide + 1}/{images.length}</span>
          </div>
          <div style={{ position: "absolute", bottom: 10, left: "50%", transform: "translateX(-50%)", display: "flex", gap: 5 }}>
            {images.map((_, i) => (
              <div key={i} onClick={() => setSlide(i)} style={{ width: i === slide ? 18 : 6, height: 6, borderRadius: 3, background: i === slide ? "#fff" : "rgba(255,255,255,0.5)", transition: "all 0.3s", cursor: "pointer" }} />
            ))}
          </div>
        </div>
      );
    };

    // ── Top Header (Feed) ──
    const TopHeader = () => {
      const [activeTab, setActiveTab] = useState("Explore");
      const tabs = ["Follow", "Explore", "Nearby"];
      return (
        <div style={{ background: "#fff", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 16px", borderBottom: "1px solid #E4E6EA", position: "sticky", top: 0, zIndex: 100 }}>
          <div style={{ display: "flex", alignItems: "center" }}>
            {tabs.map(tab => (
              <button key={tab} onClick={() => setActiveTab(tab)} style={{ background: "none", border: "none", cursor: "pointer", padding: "14px 14px 12px 14px", fontSize: 15, fontWeight: tab === activeTab ? 700 : 400, color: tab === activeTab ? "#050505" : "#65676B", borderBottom: tab === activeTab ? "3px solid #1877F2" : "3px solid transparent", marginBottom: -1 }}>
                {tab}
              </button>
            ))}
          </div>
          <button style={{ background: "none", border: "none", cursor: "pointer", padding: 8, display: "flex", alignItems: "center" }}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#050505" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </button>
        </div>
      );
    };

    // ── Stories Row ──
    const StoriesRow = () => (
      <div style={{ background: "#fff", padding: "12px 16px 14px 16px", display: "flex", gap: 16, overflowX: "auto", borderBottom: "1px solid #E4E6EA" }}>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6, flexShrink: 0 }}>
          <div style={{ width: 62, height: 62, borderRadius: "50%", background: "#E4E6EA", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#65676B" strokeWidth="2.2" strokeLinecap="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </div>
          <span style={{ fontSize: 12, color: "#65676B" }}>Story</span>
        </div>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6, flexShrink: 0 }}>
          <div style={{ width: 62, height: 62, borderRadius: "50%", background: "linear-gradient(135deg, #1877F2 0%, #00C6FF 100%)", padding: 1.5, boxSizing: "border-box" }}>
            <div style={{ width: "100%", height: "100%", borderRadius: "50%", border: "1.5px solid #fff", background: "linear-gradient(135deg, #1a3a6b 0%, #2563EB 50%, #60A5FA 100%)", display: "flex", alignItems: "center", justifyContent: "center", boxSizing: "border-box" }}>
              <span style={{ fontSize: 20, fontWeight: 700, color: "#fff" }}>M</span>
            </div>
          </div>
          <span style={{ fontSize: 12, color: "#1877F2", fontWeight: 600 }}>MOT</span>
        </div>
      </div>
    );

    // ── Feed Post Card (clickable) ──
    const FeedPostCard = ({ onOpen }) => {
      const [liked, setLiked] = useState(false);
      const [likeCount, setLikeCount] = useState(241000);
      const [animating, setAnimating] = useState(false);
      const handleLike = (e) => {
        e.stopPropagation();
        const wasLiked = liked;
        setLiked(!wasLiked);
        setLikeCount(c => wasLiked ? c - 1 : c + 1);
        if (!wasLiked) { setAnimating(true); setTimeout(() => setAnimating(false), 400); }
      };
      const formatCount = (n) => n >= 1000 ? (n % 1000 === 0 ? n / 1000 : (n / 1000).toFixed(1)) + "K" : n.toString();

      return (
        <div style={{ width: "100%", background: "#ffffff", boxShadow: "0 1px 2px rgba(0,0,0,0.2)", cursor: "pointer" }} onClick={onOpen}>
          {/* Header */}
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", padding: "12px 12px 0 12px" }}>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <div onClick={e => e.stopPropagation()} style={{ width: 40, height: 40, borderRadius: "50%", background: "linear-gradient(135deg, #1877F2 0%, #42b883 100%)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 16, fontWeight: 700, color: "#fff", letterSpacing: "-0.5px", cursor: "pointer" }}>YB</div>
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                  <span onClick={e => e.stopPropagation()} style={{ fontWeight: 600, fontSize: 15, color: "#050505", lineHeight: "1.3", cursor: "pointer" }}>Your Brand Name</span>
                  <CheckBadge />
                </div>
                <div style={{ fontSize: 12, color: "#65676B", marginTop: 1, display: "flex", alignItems: "center", gap: 4 }}>
                  @yourbrand · 4h · <GlobeIcon />
                </div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 4 }}>
              {[<DotsIcon key="d"/>, <CloseIcon key="c"/>].map((icon, i) => (
                <button key={i} onClick={e => e.stopPropagation()} style={{ background: "none", border: "none", cursor: "pointer", padding: 6, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center" }}
                  onMouseEnter={e => e.currentTarget.style.background = "#F2F2F2"}
                  onMouseLeave={e => e.currentTarget.style.background = "none"}>{icon}</button>
              ))}
            </div>
          </div>
          {/* Caption */}
          <div style={{ padding: "8px 16px 12px 16px", fontSize: 15, color: "#050505", lineHeight: 1.5 }}>
            A short caption to add personality to your post. Emojis are supported 🦎
          </div>
          {/* Carousel */}
          <div onClick={e => e.stopPropagation()}><ImageCarousel /></div>
          {/* Seen by */}
          <div style={{ display: "flex", alignItems: "center", padding: "8px 16px 6px 16px", gap: 6 }}>
            <div style={{ display: "flex", alignItems: "center" }}>
              {["https://i.pravatar.cc/40?img=5","https://i.pravatar.cc/40?img=12","https://i.pravatar.cc/40?img=23"].map((src, i) => (
                <img key={i} src={src} alt="" style={{ width: 18, height: 18, borderRadius: "50%", border: "1.5px solid #fff", marginLeft: i === 0 ? 0 : -6, zIndex: 3 - i, position: "relative", objectFit: "cover" }} />
              ))}
            </div>
            <span style={{ fontSize: 14, color: "#050505" }}>Seen by <span style={{ fontWeight: 600 }}>princess_peace</span> and more</span>
          </div>
          {/* Action bar */}
          <div style={{ display: "flex", padding: "4px 4px", alignItems: "center" }}>
            <PillButton label={formatCount(likeCount)} active={liked} activeColor="#F33E58" onClick={handleLike} renderIcon={() => <HeartIcon filled={liked} animating={animating} size={20} />} />
            <div style={{ flex: 1, display: "flex", justifyContent: "center", padding: "4px 2px" }}>
              <div onClick={e => e.stopPropagation()} style={{ display: "flex", alignItems: "center", gap: 7, background: "#F0F2F5", borderRadius: 24, padding: "7px 10px", cursor: "text", width: "72%" }}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8A8D91" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}>
                  <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                </svg>
                <span style={{ fontSize: 14, color: "#8A8D91", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>Say something…</span>
              </div>
            </div>
            <PillButton label="Share" active={false} onClick={e => e.stopPropagation()} renderIcon={() => <ShareIcon />} />
          </div>
          <div style={{ padding: "2px 16px 6px 16px", fontSize: 14, color: "#65676B" }}>
            Posted on <span style={{ color: "#1877F2", cursor: "pointer", fontWeight: 500 }}>Thum-klyc/LifeProTips</span>
          </div>
          <div style={{ padding: "0 16px 14px 16px", fontSize: 15, color: "#050505", lineHeight: 1.5 }}>
            A short caption to add personality to your post. Emojis are supported 🦎
          </div>
        </div>
      );
    };

    // ── What We Found ──
    const avatarColors = ["#C9A96E","#E07B7B","#6B8FD4","#5C9E7A"];
    const people = [
      { username: "lil_wyatt838", name: "Wyatt Torres", color: avatarColors[0], letter: "W" },
      { username: "sprinkles_bby19", name: "Gabriela Perez", color: avatarColors[1], letter: "G" },
      { username: "xander.the.great178", name: "Alex Koch", color: avatarColors[2], letter: "A" },
      { username: "kyia_kayaks", name: "Kyra Marie", color: avatarColors[3], letter: "K" },
    ];
    const WhatWeFound = () => {
      const [removed, setRemoved] = useState([]);
      const visible = people.filter(p => !removed.includes(p.username));
      return (
        <div style={{ background: "#fff", marginTop: 10, padding: "18px 16px 6px 16px", boxShadow: "0 1px 2px rgba(0,0,0,0.1)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
            <span style={{ fontWeight: 700, fontSize: 17, color: "#050505" }}>What we found</span>
            <button onClick={() => setRemoved(people.map(p => p.username))} style={{ background: "none", border: "none", color: "#1877F2", fontSize: 14, fontWeight: 500, cursor: "pointer", padding: 0 }}>Remove All</button>
          </div>
          <p style={{ fontSize: 13, color: "#65676B", margin: "0 0 14px 0", lineHeight: 1.5 }}>Get started and Connect with People Around You</p>
          {visible.length === 0 ? (
            <p style={{ fontSize: 14, color: "#65676B", textAlign: "center", padding: "12px 0 16px" }}>No suggestions left.</p>
          ) : visible.map(person => (
            <div key={person.username} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 18 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ width: 44, height: 44, borderRadius: "50%", background: person.color, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, fontWeight: 700, color: "#fff", flexShrink: 0 }}>{person.letter}</div>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 14, color: "#050505" }}>{person.username}</div>
                  <div style={{ fontSize: 13, color: "#65676B" }}>{person.name}</div>
                </div>
              </div>
              <button onClick={() => setRemoved(r => [...r, person.username])} style={{ background: "#fff", border: "1px solid #CED0D4", borderRadius: 8, padding: "6px 14px", fontSize: 14, fontWeight: 600, color: "#050505", cursor: "pointer" }}
                onMouseEnter={e => e.currentTarget.style.background = "#F2F2F2"}
                onMouseLeave={e => e.currentTarget.style.background = "#fff"}>Remove</button>
            </div>
          ))}
        </div>
      );
    };

    // ── Ad Post Card ──
    const AdPostCard = () => (
      <div style={{ width: "100%", background: "#ffffff", boxShadow: "0 1px 2px rgba(0,0,0,0.2)", marginTop: 10 }}>
        <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", padding: "12px 12px 0 12px" }}>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <div style={{ width: 40, height: 40, borderRadius: "50%", background: "linear-gradient(135deg, #9CA3AF 0%, #6B7280 100%)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 13, fontWeight: 700, color: "#fff" }}>WB</div>
            <div>
              <div style={{ fontWeight: 600, fontSize: 15, color: "#050505" }}>Car Dealership</div>
              <div style={{ fontSize: 12, color: "#65676B", marginTop: 1 }}>Sponsored · 12+</div>
            </div>
          </div>
          <button style={{ background: "none", border: "none", cursor: "pointer", padding: 6, borderRadius: "50%", display: "flex" }}><DotsIcon /></button>
        </div>
        <div style={{ padding: "8px 16px 12px 16px", fontSize: 15, color: "#050505", lineHeight: 1.5 }}>
          Looking for the best deal on your next car? We offer flexible financing options tailored just for you. 🚗
        </div>
        <div style={{ width: "100%", aspectRatio: "4 / 3", background: "linear-gradient(160deg, #2a2a2a 0%, #1a1a2e 60%, #16213e 100%)", position: "relative", overflow: "hidden" }}>
          <div style={{ position: "absolute", right: "10%", top: "30%", width: "45%", height: "40%", background: "radial-gradient(ellipse, rgba(180,210,255,0.55) 0%, rgba(100,160,255,0.18) 50%, transparent 80%)", borderRadius: "50%" }} />
          <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, background: "rgba(120,60,180,0.82)", padding: "8px 12px" }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#fff", letterSpacing: "0.5px", textTransform: "uppercase" }}>
              Review all loan conditions on the website.<br/>Assess your financial capabilities and risks
            </div>
          </div>
        </div>
        <button style={{ display: "flex", alignItems: "center", justifyContent: "space-between", width: "100%", background: "#000", border: "none", padding: "13px 16px", cursor: "pointer" }}
          onMouseEnter={e => e.currentTarget.style.background = "#1a1a1a"}
          onMouseLeave={e => e.currentTarget.style.background = "#000"}>
          <span style={{ fontSize: 15, fontWeight: 600, color: "#fff" }}>Signup</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <div style={{ padding: "0 16px 14px 16px", fontSize: 14, color: "#050505", lineHeight: 1.5 }}>
          Get a car loan at a reduced interest rate right now! <span style={{ color: "#65676B" }}>Show more</span>
        </div>
      </div>
    );

    // ── Skeleton loaders for WhatWeFound & AdCard ──
    const SkeletonWhatWeFound = () => (
      <div style={{ background: "#fff", marginTop: 10, padding: "18px 16px 6px 16px", boxShadow: "0 1px 2px rgba(0,0,0,0.1)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <SkeletonBox width={130} height={16} /><SkeletonBox width={70} height={13} />
        </div>
        <SkeletonBox width="80%" height={12} style={{ marginBottom: 18 }} />
        {[0,1,2,3].map(i => (
          <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 18 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              <SkeletonBox width={44} height={44} borderRadius={50} />
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                <SkeletonBox width={110} height={13} /><SkeletonBox width={80} height={11} />
              </div>
            </div>
            <SkeletonBox width={70} height={34} borderRadius={8} />
          </div>
        ))}
      </div>
    );
    const SkeletonAdCard = () => (
      <div style={{ width: "100%", background: "#fff", boxShadow: "0 1px 2px rgba(0,0,0,0.2)", marginTop: 10 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 12px 0 12px" }}>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <SkeletonBox width={40} height={40} borderRadius={50} />
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              <SkeletonBox width={120} height={13} /><SkeletonBox width={80} height={11} />
            </div>
          </div>
          <SkeletonBox width={28} height={28} borderRadius={50} />
        </div>
        <div style={{ padding: "12px 16px", display: "flex", flexDirection: "column", gap: 8 }}>
          <SkeletonBox width="90%" height={13} /><SkeletonBox width="60%" height={13} />
        </div>
        <SkeletonBox width="100%" height={0} borderRadius={0} style={{ aspectRatio: "4 / 3", height: "auto" }} />
        <div style={{ padding: "0 16px 14px 16px", display: "flex", flexDirection: "column", gap: 8, marginTop: 12 }}>
          <SkeletonBox width="90%" height={13} /><SkeletonBox width="50%" height={13} />
        </div>
      </div>
    );

    // ── Comment Row ──
    const CommentRow = ({ avatar, name, text, date, likes }) => {
      const [liked, setLiked] = useState(false);
      const [count, setCount] = useState(likes);
      const handleLike = () => { setLiked(v => !v); setCount(c => liked ? c - 1 : c + 1); };
      return (
        <div style={{ display: "flex", gap: 10, padding: "12px 16px", alignItems: "flex-start", borderBottom: "1px solid #F0F2F5" }}>
          <img src={avatar} alt={name} style={{ width: 40, height: 40, borderRadius: "50%", objectFit: "cover", flexShrink: 0, background: "#c9d3e0" }} />
          <div style={{ flex: 1, minWidth: 0 }}>
            <span style={{ fontWeight: 600, fontSize: 14, color: "#050505" }}>{name}</span>
            <p style={{ fontSize: 14, color: "#050505", lineHeight: 1.5, marginTop: 2 }}>{text}</p>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 6 }}>
              <span style={{ fontSize: 12, color: "#65676B" }}>{date}</span>
              <button onClick={handleLike} style={{ background: "none", border: "none", cursor: "pointer", display: "flex", alignItems: "center", gap: 4, color: liked ? "#F33E58" : "#65676B", padding: 0 }}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill={liked ? "#F33E58" : "none"} stroke={liked ? "#F33E58" : "#65676B"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                </svg>
                <span style={{ fontSize: 13, fontWeight: 500 }}>{count}</span>
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ── Back Header ──
    const BackHeader = ({ title, onBack }) => (
      <div style={{ display: "flex", alignItems: "center", padding: "14px 16px", backgroundColor: "#fff", borderBottom: "1px solid #e0e0e0", position: "sticky", top: 0, zIndex: 100 }}>
        <button onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", padding: "0 12px 0 0", display: "flex", alignItems: "center" }}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <line x1="20" y1="12" x2="4" y2="12" stroke="#2688eb" strokeWidth="2" strokeLinecap="round"/>
            <polyline points="10 6 4 12 10 18" fill="none" stroke="#2688eb" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </button>
        <span style={{ fontSize: 18, fontWeight: 500, color: "#000", letterSpacing: "-0.2px" }}>{title}</span>
      </div>
    );

    // ── Post Detail Page ──
    const PostDetailPage = ({ onBack }) => {
      const [liked, setLiked] = useState(false);
      const [likeCount, setLikeCount] = useState(241000);
      const [animating, setAnimating] = useState(false);
      const handleLike = () => {
        const wasLiked = liked;
        setLiked(!wasLiked);
        setLikeCount(c => wasLiked ? c - 1 : c + 1);
        if (!wasLiked) { setAnimating(true); setTimeout(() => setAnimating(false), 400); }
      };
      const formatCount = (n) => n >= 1000 ? (n % 1000 === 0 ? n / 1000 : (n / 1000).toFixed(1)) + "K" : n.toString();
      const iconBtn = (icon, key) => (
        <button key={key} style={{ background: "none", border: "none", cursor: "pointer", padding: 6, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center" }}
          onMouseEnter={e => e.currentTarget.style.background = "#F2F2F2"}
          onMouseLeave={e => e.currentTarget.style.background = "none"}>{icon}</button>
      );
      const comments = [
        { avatar: "https://randomuser.me/api/portraits/men/32.jpg", name: "Vladimir Sviridov", text: "Хороших выходных вам Алексей. 👍", date: "1 Feb 2025", likes: 3 },
        { avatar: "https://randomuser.me/api/portraits/men/54.jpg", name: "Sergey Doronin 🐻", text: "Хороших выходных вам и приятного отдыха Алексей Сергеевич", date: "1 Feb 2025", likes: 3 },
        { avatar: "https://randomuser.me/api/portraits/men/76.jpg", name: "Alexey Lukshich 🎿", text: "Все верно. Поддерживаем!!", date: "1 Feb 2025", likes: 5 },
      ];
      return (
        <div style={{ width: "100%", minHeight: "100vh", background: "#f0f2f5" }}>
          <BackHeader title="Your Brand Name" onBack={onBack} />
          <div style={{ width: "100%", background: "#ffffff", boxShadow: "0 1px 2px rgba(0,0,0,0.2)" }}>
            {/* Post header */}
            <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", padding: "12px 12px 0 12px" }}>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <div style={{ width: 40, height: 40, borderRadius: "50%", background: "linear-gradient(135deg, #1877F2 0%, #42b883 100%)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 16, fontWeight: 700, color: "#fff", letterSpacing: "-0.5px" }}>YB</div>
                <div>
                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                    <span style={{ fontWeight: 600, fontSize: 15, color: "#050505", lineHeight: "1.3" }}>Your Brand Name</span>
                    <CheckBadge />
                  </div>
                  <div style={{ fontSize: 12, color: "#65676B", marginTop: 1, display: "flex", alignItems: "center", gap: 4 }}>
                    @yourbrand · 4h · <GlobeIcon />
                  </div>
                </div>
              </div>
              <div style={{ display: "flex", gap: 4 }}>
                {iconBtn(<DotsIcon />, "dots")}{iconBtn(<CloseIcon />, "close")}
              </div>
            </div>
            <div style={{ padding: "8px 16px 12px 16px", fontSize: 15, color: "#050505", lineHeight: 1.5 }}>
              A short caption to add personality to your post. Emojis are supported 🦎
            </div>
            <ImageCarousel />
            <div style={{ display: "flex", alignItems: "center", padding: "8px 16px 6px 16px", gap: 6 }}>
              <div style={{ display: "flex", alignItems: "center" }}>
                {["https://i.pravatar.cc/40?img=5","https://i.pravatar.cc/40?img=12","https://i.pravatar.cc/40?img=23"].map((src, i) => (
                  <img key={i} src={src} alt="" style={{ width: 18, height: 18, borderRadius: "50%", border: "1.5px solid #fff", marginLeft: i === 0 ? 0 : -6, zIndex: 3 - i, position: "relative", objectFit: "cover" }} />
                ))}
              </div>
              <span style={{ fontSize: 14, color: "#050505" }}>Seen by <span style={{ fontWeight: 600 }}>princess_peace</span> and more</span>
            </div>
            <div style={{ display: "flex", padding: "4px 4px", alignItems: "center" }}>
              <PillButton label={formatCount(likeCount)} active={liked} activeColor="#F33E58" onClick={handleLike} renderIcon={() => <HeartIcon filled={liked} animating={animating} size={20} />} />
              <div style={{ flex: 1, display: "flex", justifyContent: "center", padding: "4px 2px" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 7, background: "#F0F2F5", borderRadius: 24, padding: "7px 10px", cursor: "text", width: "72%" }}>
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8A8D91" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}>
                    <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                  </svg>
                  <span style={{ fontSize: 14, color: "#8A8D91", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>Say something…</span>
                </div>
              </div>
              <PillButton label="Share" active={false} onClick={() => {}} renderIcon={() => <ShareIcon />} />
            </div>
            <div style={{ padding: "2px 16px 6px 16px", fontSize: 14, color: "#65676B" }}>
              Posted on <span style={{ color: "#1877F2", cursor: "pointer", fontWeight: 500 }}>Thum-klyc/LifeProTips</span>
            </div>
            <div style={{ padding: "0 16px 14px 16px", fontSize: 15, color: "#050505", lineHeight: 1.5 }}>
              A short caption to add personality to your post. Emojis are supported 🦎
            </div>
            {/* Comments */}
            <div style={{ borderTop: "1px solid #F0F2F5" }}>
              {comments.map((c, i) => <CommentRow key={i} {...c} />)}
            </div>
          </div>
        </div>
      );
    };

    // ── App ──
    function App() {
      const [page, setPage] = useState("feed");
      const [loaded, setLoaded] = useState(false);

      useEffect(() => {
        const timer = setTimeout(() => setLoaded(true), 2500);
        return () => clearTimeout(timer);
      }, []);

      const openPost = () => {
        Loader.start();
        setTimeout(() => {
          setPage("detail");
          Loader.finish();
          window.scrollTo(0, 0);
        }, 600);
      };

      const goBack = () => {
        Loader.start();
        setTimeout(() => {
          setPage("feed");
          Loader.finish();
          window.scrollTo(0, 0);
        }, 600);
      };

      if (page === "detail") {
        return <PostDetailPage onBack={goBack} />;
      }

      return (
        <>
          <style>{shimmer}</style>
          <div style={{ width: "100%", minHeight: "100vh", background: "#EFEFEF" }}>
            <TopHeader />
            <StoriesRow />
            {loaded ? <FeedPostCard onOpen={openPost} /> : <SkeletonCard />}
            {loaded ? <WhatWeFound /> : <SkeletonWhatWeFound />}
            {loaded ? <AdPostCard /> : <SkeletonAdCard />}
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
  <script src="postpop.js"></script>
</html>
