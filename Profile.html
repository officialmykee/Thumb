<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Skeleton</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    @keyframes shimmer {
      0%   { background-position: -700px 0; }
      100% { background-position:  700px 0; }
    }
    @keyframes heartPop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.4); }
      70%  { transform: scale(0.88); }
      100% { transform: scale(1); }
    }
    @media (max-width: 820px) {
      .ls { width: 170px !important; }
      .rs { width: 170px !important; }
    }
    @media (max-width: 580px) {
      .ls, .rs { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useState } = React;

    const shimmerStyle = {
      background: "linear-gradient(90deg, #e8eaed 25%, #f2f3f5 50%, #e8eaed 75%)",
      backgroundSize: "700px 100%",
      animation: "shimmer 1.5s 1 linear forwards",
      borderRadius: "6px",
      display: "block",
    };

    const doneStyle = {
      background: "#e8eaed",
      animation: "none",
      borderRadius: "6px",
      display: "block",
    };

    function Bone({ style, done }) {
      return <span style={{ ...(done ? doneStyle : shimmerStyle), ...style }} />;
    }

    function LeftSidebar({ done }) {
      return (
        <div style={{
          width: 220, flexShrink: 0, background: "#ffffff",
          borderRight: "1px solid #e4e6e9", padding: "20px 16px",
          display: "flex", flexDirection: "column", gap: 12,
        }}>
          <Bone done={done} style={{ width: 48, height: 48, borderRadius: "50%", marginBottom: 4 }} />
          <Bone done={done} style={{ height: 12, width: "72%" }} />
          <Bone done={done} style={{ height: 10, width: "52%" }} />
          <div style={{ height: 1, background: "#ebebeb", margin: "4px 0" }} />
          {[true, false, false, false, false, false].map((active, i) => (
            <div key={i} style={{
              display: "flex", alignItems: "center", gap: 10,
              padding: "8px 10px", borderRadius: 8,
              background: active ? "#eef0f5" : "#f7f8fa",
            }}>
              <Bone done={done} style={{ width: 16, height: 16, borderRadius: 4, flexShrink: 0 }} />
              <Bone done={done} style={{ height: 10, flex: 1 }} />
            </div>
          ))}
        </div>
      );
    }

    function RightSidebar({ done }) {
      return (
        <div style={{
          width: 220, flexShrink: 0, background: "#ffffff",
          borderLeft: "1px solid #e4e6e9", padding: "20px 16px",
          display: "flex", flexDirection: "column", gap: 12,
        }}>
          <Bone done={done} style={{ height: 11, width: "55%", marginBottom: 4 }} />
          {[0, 1, 2, 3].map(i => (
            <div key={i} style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <Bone done={done} style={{ width: 34, height: 34, borderRadius: "50%", flexShrink: 0 }} />
              <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 6 }}>
                <Bone done={done} style={{ height: 10, width: "68%" }} />
                <Bone done={done} style={{ height: 9, width: "46%" }} />
              </div>
              <Bone done={done} style={{ height: 24, width: 54, borderRadius: 12, flexShrink: 0 }} />
            </div>
          ))}
          <div style={{ height: 1, background: "#ebebeb", margin: "4px 0" }} />
          <Bone done={done} style={{ height: 11, width: "55%", marginBottom: 4 }} />
          {[0, 1, 2, 3].map(i => (
            <div key={i} style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              <Bone done={done} style={{ height: 10, width: "40%" }} />
              <Bone done={done} style={{ height: 10, width: "80%" }} />
              <Bone done={done} style={{ height: 9, width: "50%" }} />
            </div>
          ))}
        </div>
      );
    }

    /* ── Post Card components ── */
    const SkeletonBox = ({ width = "100%", height = 14, borderRadius = 6, style = {} }) => (
      <div style={{ width, height, borderRadius, background: "linear-gradient(90deg, #E8EAED 25%, #F4F5F7 50%, #E8EAED 75%)", backgroundSize: "600px 100%", animation: "shimmer 1.4s infinite linear", ...style }} />
    );

    const SkeletonCard = () => (
      <div style={{ width: "100%", background: "#fff", boxShadow: "0 1px 2px rgba(0,0,0,0.2)" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 12px 0 12px" }}>
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <SkeletonBox width={40} height={40} borderRadius={50} />
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              <SkeletonBox width={130} height={13} />
              <SkeletonBox width={80} height={11} />
            </div>
          </div>
          <div style={{ display: "flex", gap: 4 }}>
            <SkeletonBox width={28} height={28} borderRadius={50} />
            <SkeletonBox width={28} height={28} borderRadius={50} />
          </div>
        </div>
        <div style={{ padding: "12px 16px", display: "flex", flexDirection: "column", gap: 8 }}>
          <SkeletonBox width="90%" height={13} />
          <SkeletonBox width="60%" height={13} />
        </div>
        <SkeletonBox width="100%" height={0} borderRadius={0} style={{ aspectRatio: "1 / 1.15", height: "auto" }} />
        <div style={{ display: "flex", alignItems: "center", padding: "8px 16px 6px 16px", gap: 8 }}>
          <div style={{ display: "flex" }}>
            {[0,1,2].map(i => <SkeletonBox key={i} width={18} height={18} borderRadius={50} style={{ marginLeft: i === 0 ? 0 : -6, flexShrink: 0 }} />)}
          </div>
          <SkeletonBox width={160} height={13} />
        </div>
        <div style={{ display: "flex", padding: "4px 4px" }}>
          {[1,2,3].map(i => (
            <div key={i} style={{ flex: 1, display: "flex", justifyContent: "center", padding: "4px 2px" }}>
              <SkeletonBox width="80%" height={34} borderRadius={20} />
            </div>
          ))}
        </div>
        <div style={{ padding: "2px 16px 6px 16px" }}><SkeletonBox width={160} height={13} /></div>
        <div style={{ padding: "0 16px 14px 16px" }}><SkeletonBox width="50%" height={14} /></div>
      </div>
    );

    const HeartIcon = ({ filled, animating, size = 20 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={filled ? "#F33E58" : "none"} stroke={filled ? "#F33E58" : "currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ animation: animating ? "heartPop 0.35s ease" : "none", display: "block", flexShrink: 0 }}>
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    );

    const ShareIcon = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
        <polyline points="16 6 12 2 8 6"/>
        <line x1="12" y1="2" x2="12" y2="15"/>
      </svg>
    );

    const DotsIcon = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#65676B">
        <circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/>
      </svg>
    );

    const CloseIcon = () => (
      <svg width="20" height="20" viewBox="0 0 24 24">
        <line x1="18" y1="6" x2="6" y2="18" stroke="#65676B" strokeWidth="2" strokeLinecap="round"/>
        <line x1="6" y1="6" x2="18" y2="18" stroke="#65676B" strokeWidth="2" strokeLinecap="round"/>
      </svg>
    );

    const GlobeIcon = () => (
      <svg width="12" height="12" viewBox="0 0 24 24" fill="#65676B">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12" stroke="white" strokeWidth="2"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" fill="none" stroke="#65676B" strokeWidth="1.5"/>
      </svg>
    );

    const CheckBadge = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="#1877F2">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="9 12 11 14 15 10" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    );

    const PillButton = ({ renderIcon, label, active, activeColor = "#65676B", onClick }) => (
      <button onClick={onClick} style={{ flex: 1, background: "none", border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", padding: "4px 2px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "7px 14px", borderRadius: 20, color: active ? activeColor : "#65676B" }}>
          {renderIcon()}
          <span style={{ fontSize: 15, fontWeight: 600, color: active ? activeColor : "#65676B" }}>{label}</span>
        </div>
      </button>
    );

    const ImageCarousel = () => {
      const images = [
        "https://picsum.photos/seed/socialpost/800/920",
        "https://picsum.photos/seed/nature42/800/920"
      ];
      const [slide, setSlide] = useState(0);
      const startX = React.useRef(null);

      const onTouchStart = (e) => { startX.current = e.touches[0].clientX; };
      const onTouchEnd = (e) => {
        if (startX.current === null) return;
        const diff = startX.current - e.changedTouches[0].clientX;
        if (diff > 40 && slide < images.length - 1) setSlide(s => s + 1);
        if (diff < -40 && slide > 0) setSlide(s => s - 1);
        startX.current = null;
      };
      const onMouseDown = (e) => { startX.current = e.clientX; };
      const onMouseUp = (e) => {
        if (startX.current === null) return;
        const diff = startX.current - e.clientX;
        if (diff > 40 && slide < images.length - 1) setSlide(s => s + 1);
        if (diff < -40 && slide > 0) setSlide(s => s - 1);
        startX.current = null;
      };

      return (
        <div style={{ width: "100%", aspectRatio: "1 / 1.15", position: "relative", overflow: "hidden", cursor: "grab", userSelect: "none" }}
          onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}
          onMouseDown={onMouseDown} onMouseUp={onMouseUp}
        >
          <div style={{ display: "flex", width: `${images.length * 100}%`, height: "100%", transform: `translateX(-${slide * (100 / images.length)}%)`, transition: "transform 0.35s cubic-bezier(0.4,0,0.2,1)" }}>
            {images.map((src, i) => (
              <img key={i} src={src} alt={`Slide ${i + 1}`} draggable="false"
                style={{ width: `${100 / images.length}%`, height: "100%", objectFit: "cover", display: "block", flexShrink: 0 }} />
            ))}
          </div>
          <div style={{ position: "absolute", top: 10, right: 10, background: "rgba(0,0,0,0.45)", borderRadius: 20, padding: "4px 10px" }}>
            <span style={{ color: "#fff", fontSize: 13, fontWeight: 600, letterSpacing: 0.3 }}>{slide + 1}/{images.length}</span>
          </div>
          <div style={{ position: "absolute", bottom: 10, left: "50%", transform: "translateX(-50%)", display: "flex", gap: 5 }}>
            {images.map((_, i) => (
              <div key={i} onClick={() => setSlide(i)}
                style={{ width: i === slide ? 18 : 6, height: 6, borderRadius: 3, background: i === slide ? "#fff" : "rgba(255,255,255,0.5)", transition: "all 0.3s", cursor: "pointer" }} />
            ))}
          </div>
        </div>
      );
    };

    const PostCard = () => {
      const [liked, setLiked] = useState(false);
      const [likeCount, setLikeCount] = useState(241000);
      const [animating, setAnimating] = useState(false);

      const handleLike = () => {
        const wasLiked = liked;
        setLiked(!wasLiked);
        setLikeCount(c => wasLiked ? c - 1 : c + 1);
        if (!wasLiked) { setAnimating(true); setTimeout(() => setAnimating(false), 400); }
      };

      const formatCount = (n) => n >= 1000 ? (n % 1000 === 0 ? n / 1000 : (n / 1000).toFixed(1)) + "K" : n.toString();

      return (
        <div style={{ width: "100%", background: "#ffffff", boxShadow: "0 1px 2px rgba(0,0,0,0.2)" }}>
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", padding: "12px 12px 0 12px" }}>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <div style={{ width: 40, height: 40, borderRadius: "50%", background: "linear-gradient(135deg, #1877F2 0%, #42b883 100%)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 16, fontWeight: 700, color: "#fff", letterSpacing: "-0.5px" }}>YB</div>
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                  <span style={{ fontWeight: 600, fontSize: 15, color: "#050505", cursor: "pointer", lineHeight: "1.3" }}>Your Brand Name</span>
                  <CheckBadge />
                </div>
                <div style={{ fontSize: 12, color: "#65676B", marginTop: 1, display: "flex", alignItems: "center", gap: 4 }}>
                  @yourbrand · 4h · <GlobeIcon />
                </div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 4 }}>
              {[<DotsIcon key="d"/>, <CloseIcon key="c"/>].map((icon, i) => (
                <button key={i} style={{ background: "none", border: "none", cursor: "pointer", padding: 6, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center" }}
                  onMouseEnter={e => e.currentTarget.style.background = "#F2F2F2"}
                  onMouseLeave={e => e.currentTarget.style.background = "none"}
                >{icon}</button>
              ))}
            </div>
          </div>

          <div style={{ padding: "8px 16px 12px 16px", fontSize: 15, color: "#050505", lineHeight: 1.5 }}>
            A short caption to add personality to your post. Emojis are supported 🦎
          </div>

          <ImageCarousel />

          <div style={{ display: "flex", alignItems: "center", padding: "8px 16px 6px 16px", gap: 6 }}>
            <div style={{ display: "flex", alignItems: "center" }}>
              {[
                "https://i.pravatar.cc/40?img=5",
                "https://i.pravatar.cc/40?img=12",
                "https://i.pravatar.cc/40?img=23"
              ].map((src, i) => (
                <img key={i} src={src} alt="" style={{ width: 18, height: 18, borderRadius: "50%", border: "1.5px solid #fff", marginLeft: i === 0 ? 0 : -6, zIndex: 3 - i, position: "relative", objectFit: "cover" }} />
              ))}
            </div>
            <span style={{ fontSize: 14, color: "#050505", lineHeight: 1.4 }}>
              Seen by <span style={{ fontWeight: 600 }}>princess_peace</span> and more
            </span>
          </div>

          <div style={{ display: "flex", padding: "4px 4px", alignItems: "center" }}>
            <PillButton label={formatCount(likeCount)} active={liked} activeColor="#F33E58" onClick={handleLike} renderIcon={() => <HeartIcon filled={liked} animating={animating} size={20} />} />
            <div style={{ flex: 1, display: "flex", justifyContent: "center", padding: "4px 2px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 7, background: "#F0F2F5", borderRadius: 24, padding: "7px 10px", cursor: "text", width: "72%" }}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#8A8D91" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }}>
                  <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                </svg>
                <span style={{ fontSize: 14, color: "#8A8D91", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>Say something…</span>
              </div>
            </div>
            <PillButton label="Share" active={false} onClick={() => {}} renderIcon={() => <ShareIcon />} />
          </div>

          <div style={{ padding: "2px 16px 6px 16px", fontSize: 14, color: "#65676B" }}>
            Posted on <span style={{ color: "#1877F2", cursor: "pointer", fontWeight: 500 }}>Thum-klyc/LifeProTips</span>
          </div>
          <div style={{ padding: "0 16px 14px 16px", fontSize: 15, color: "#050505", lineHeight: 1.5 }}>
            A short caption to add personality to your post. Emojis are supported 🦎
          </div>
        </div>
      );
    };

    const tabs = ["Posts", "Gifts", "Media", "Files", "Links"];

    function TabBar() {
      const [active, setActive] = useState("Posts");
      return (
        <div style={{
          background: "#ffffff",
          borderBottom: "1px solid #e8eaed",
          display: "flex",
          padding: "0 20px",
          gap: 4,
        }}>
          {tabs.map(tab => (
            <button
              key={tab}
              onClick={() => setActive(tab)}
              style={{
                background: "none", border: "none", cursor: "pointer",
                padding: "12px 14px 10px",
                fontSize: 14, fontWeight: active === tab ? 600 : 400,
                color: active === tab ? "#1a6ef5" : "#6b7280",
                fontFamily: "DM Sans, sans-serif",
                position: "relative",
                transition: "color 0.15s",
              }}
            >
              {tab}
              {active === tab && (
                <span style={{
                  position: "absolute", bottom: 0, left: 0, right: 0,
                  height: 3, background: "#1a6ef5", borderRadius: "3px 3px 0 0",
                }} />
              )}
            </button>
          ))}
        </div>
      );
    }

    function Center({ done, loaded }) {
      return (
        <div style={{ flex: 1, minWidth: 0, background: "#f2f3f5", display: "flex", flexDirection: "column" }}>
          <div style={{
            height: 160,
            background: "url('https://picsum.photos/seed/cover42/900/300') center/cover no-repeat",
            position: "relative", flexShrink: 0,
          }}>
            <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.35)", pointerEvents: "none" }} />
            <button style={{
              position: "absolute", top: 14, left: 14,
              background: "rgba(0,0,0,0.4)", border: "none",
              width: 36, height: 36, borderRadius: 50,
              cursor: "pointer", zIndex: 2,
              display: "flex", alignItems: "center", justifyContent: "center",
            }}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="#ffffff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            </button>
          </div>

          <div style={{ background: "#ffffff", position: "relative" }}>
            <div style={{
              padding: "0 20px", marginTop: -62, marginBottom: 0,
              display: "flex", alignItems: "flex-end", justifyContent: "space-between",
            }}>
              <img
                src="https://picsum.photos/seed/profile7/200/200"
                alt="Profile"
                style={{
                  width: 124, height: 124, borderRadius: "50%",
                  border: "4px solid #ffffff", flexShrink: 0, objectFit: "cover", display: "block",
                }}
              />
              <button style={{
                background: "#1a6ef5", border: "none", color: "#ffffff",
                fontFamily: "DM Sans, sans-serif", fontSize: 13, fontWeight: 500,
                padding: "7px 16px", borderRadius: 20, cursor: "pointer", marginBottom: 6,
                display: "flex", alignItems: "center", gap: 6,
              }}>
                Follow
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="6" r="4" fill="#ffffff" />
                  <path fillRule="evenodd" clipRule="evenodd" d="M16.5 22C14.8501 22 14.0251 22 13.5126 21.4874C13 20.9749 13 20.1499 13 18.5C13 16.8501 13 16.0251 13.5126 15.5126C14.0251 15 14.8501 15 16.5 15C18.1499 15 18.9749 15 19.4874 15.5126C20 16.0251 20 16.8501 20 18.5C20 20.1499 20 20.9749 19.4874 21.4874C18.9749 22 18.1499 22 16.5 22ZM18.468 17.7458C18.6958 17.518 18.6958 17.1487 18.468 16.9209C18.2402 16.693 17.8709 16.693 17.6431 16.9209L15.7222 18.8417L15.3569 18.4764C15.1291 18.2486 14.7598 18.2486 14.532 18.4764C14.3042 18.7042 14.3042 19.0736 14.532 19.3014L15.3097 20.0791C15.5375 20.307 15.9069 20.307 16.1347 20.0791L18.468 17.7458Z" fill="#ffffff" />
                  <path opacity="0.5" d="M18.0947 15.0312C17.6699 15 17.1487 15 16.5 15C14.8501 15 14.0251 15 13.5126 15.5126C13 16.0251 13 16.8501 13 18.5C13 19.6663 13 20.4204 13.1811 20.9433C12.7971 20.9806 12.4025 21 12 21C8.13401 21 5 19.2091 5 17C5 14.7909 8.13401 13 12 13C14.6134 13 16.8924 13.8184 18.0947 15.0312Z" fill="#ffffff" />
                </svg>
              </button>
            </div>

            <div style={{ padding: "10px 20px 4px 37px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <p style={{ fontSize: 18, fontWeight: 600, color: "#1a1a1a", lineHeight: 1.2, margin: 0 }}>
                Nikolai
              </p>
              <p style={{ fontSize: 13, color: "#4a5568", margin: 0 }}>
                <span style={{ fontWeight: 600, color: "#1a1a1a" }}>482.6K</span> followers
              </p>
            </div>

            <div style={{ padding: "6px 20px 16px" }}>
              <p style={{ fontSize: 13, color: "#4a5568", lineHeight: 1.6 }}>
                Chasing slow mornings & open trails 🍃 Botanist by training, wanderer by nature — if it grows, I'm probably photographing it 🍀 Based in Helsinki · he/him
              </p>
            </div>
          </div>

          <TabBar />
          <div style={{ flex: 1 }}>
            {loaded ? <PostCard /> : <SkeletonCard />}
          </div>
        </div>
      );
    }

    function ProfileSkeleton() {
      const [done, setDone] = useState(false);
      const [loaded, setLoaded] = useState(false);

      useEffect(() => {
        const t1 = setTimeout(() => setDone(true), 1500);
        const t2 = setTimeout(() => setLoaded(true), 2500);
        return () => { clearTimeout(t1); clearTimeout(t2); };
      }, []);

      return (
        <div style={{ fontFamily: "DM Sans, sans-serif", background: "#f2f3f5", minHeight: "100vh", display: "flex", flexDirection: "column" }}>
          <div style={{ display: "flex", flex: 1, width: "100%" }}>
            <div className="ls"><LeftSidebar done={done} /></div>
            <Center done={done} loaded={loaded} />
            <div className="rs"><RightSidebar done={done} /></div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ProfileSkeleton />);
  </script>
  <script src="postpop.js"></script>
</body>
</html>
